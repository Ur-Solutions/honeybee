# honeybee tmux bindings (unmanaged — paste or source-file into your conf)
# Command-B: tmux cannot see macOS Command directly; configure your terminal to
# send Meta-b for Cmd-b, then this M-b binding is the tmux side.

# Bees sidebar — grouped fuzzy fleet browser on the left (~54 columns by default)
bind-key -n M-b run-shell -b "hive bees --toggle-sidebar"

# Interactive spawn picker (popup)
bind-key -n M-n display-popup -E "hive new"

# Attention queue — jump the current client to the next/prev bee that needs you
# (waiting/done/failed), skipping the working majority. Repeat to cycle. The
# shifted glyphs ">" / "<" read as forward/back. Local bees only (switch-client
# cannot cross to a remote tmux server).
bind-key -n M-. run-shell -b "hive next"
bind-key -n M-, run-shell -b "hive next --prev"

# Rename the current (attached) bee via a popup prompt → `hive rename --here`.
# Wrapped in run-shell because only run-shell expands #{pane_id} (display-popup
# does not); the pane id is exported as TMUX_PANE so the bee owning the pane is
# resolved correctly (even inside a comb). Quoting note: $TMUX_PANE is empty
# inside a popup and `read -p` is bash-only, so the prompt lives in a small bash
# helper script rather than inline shell.
bind-key -n M-r run-shell "tmux display-popup -E -w 60% -h 20% \"TMUX_PANE=#{pane_id} ~/path/to/hive-rename-popup.sh\""
# hive-rename-popup.sh:
#   #!/bin/bash
#   read -r -p "rename bee> " title || exit 0
#   [ -n "$title" ] || exit 0
#   hive rename --here "$title"

# Session switcher (existing mesh pattern; keep if not already bound)
# bind-key -n M-s run-shell "tmux list-sessions -F '#{session_name} #{@hive_title} #{@hive_colony} #{@hive_state}' | fzf --prompt='bee> ' | awk '{print \$1}' | xargs -r tmux switch-client -t ="

# Needs-me switcher — the switcher above, pre-filtered to the attention set
# (bees whose @hive_state is set and not `working`: waiting/done/failed). The
# pull escape hatch for picking one by title instead of cycling with M-./M-,.
bind-key -n M-S display-popup -E -w 80% -h 50% \
  "tmux ls -f '#{&&:#{@hive_state},#{!=:#{@hive_state},working}}' -F '#{?session_attached,● ,○ }#S  #{@hive_title} [#{@hive_state}]' | fzf --prompt='needs me> ' --ansi | cut -d' ' -f2 | xargs -r tmux switch-client -t"

